<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematrix Kingle</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Navigation Bar -->
    <nav id="navbar" class="navbar">
        <div class="nav-left">
            <h1 class="logo">CINEMATRIX</h1>
            <ul class="nav-links">
                <li>Home</li>
                <li>TV Shows</li>
                <li>Movies</li>
                <li>New & Popular</li>
                <li>My List</li>
            </ul>
        </div>
        <div class="nav-right">
            <button class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </button>
            <div class="profile-avatar"></div>
        </div>
    </nav>

    <!-- Hero Spotlight Banner -->
    <header id="hero-banner" class="hero">
        <div class="hero-content">
            <h2 id="hero-title" class="hero-title">Loading Spotlight...</h2>
            <p id="hero-desc" class="hero-desc">Fetching the latest cinematic selections...</p>
            <div class="hero-buttons">
                <button class="btn btn-play">
                    <svg xmlns="http://www.w3.org/2000/svg" class="btn-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                    </svg>
                    Play
                </button>
                <button class="btn btn-info">
                    <svg xmlns="http://www.w3.org/2000/svg" class="btn-icon-outline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    More Info
                </button>
            </div>
        </div>
    </header>

    <!-- Carousel Rows Container -->
    <main class="main-content">
        
        <section class="movie-row">
            <h3 class="row-title">Trending Now</h3>
            <div id="trending-row" class="row-posters scrollbar-hidden"></div>
        </section>

        <section class="movie-row">
            <h3 class="row-title">Top Rated</h3>
            <div id="top-rated-row" class="row-posters scrollbar-hidden"></div>
        </section>

        <section class="movie-row">
            <h3 class="row-title">Popular on Cinematrix</h3>
            <div id="popular-row" class="row-posters scrollbar-hidden"></div>
        </section>

        <section class="movie-row">
            <h3 class="row-title">Upcoming Releases</h3>
            <div id="upcoming-row" class="row-posters scrollbar-hidden"></div>
        </section>

        <section class="movie-row">
            <h3 class="row-title">Action Thrillers</h3>
            <div id="action-row" class="row-posters scrollbar-hidden"></div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
